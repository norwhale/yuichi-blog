<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" role="img" aria-label="Chemical synapse">
  <rect width="600" height="320" fill="#0a0a0a"/>
  <path d="M60 40 C60 160 140 160 180 160 L260 160 C280 160 280 180 260 180 L180 180 C140 180 60 180 60 300 Z"
        fill="#0ea5e9" fill-opacity="0.15" stroke="#06B6D4" stroke-width="2"/>
  <path d="M540 40 C540 160 460 160 420 160 L340 160 C320 160 320 180 340 180 L420 180 C460 180 540 180 540 300 Z"
        fill="#8b5cf6" fill-opacity="0.15" stroke="#a78bfa" stroke-width="2"/>
  <g fill="#06B6D4">
    <circle cx="230" cy="140" r="6"/>
    <circle cx="220" cy="120" r="6"/>
    <circle cx="245" cy="115" r="6"/>
    <circle cx="260" cy="135" r="6"/>
    <circle cx="250" cy="150" r="5"/>
  </g>
  <g fill="#67e8f9">
    <circle cx="275" cy="165" r="3"/>
    <circle cx="285" cy="172" r="3"/>
    <circle cx="295" cy="168" r="3"/>
    <circle cx="305" cy="175" r="3"/>
    <circle cx="315" cy="170" r="3"/>
  </g>
  <g fill="#f59e0b">
    <rect x="330" y="155" width="14" height="8" rx="2"/>
    <rect x="350" y="155" width="14" height="8" rx="2"/>
    <rect x="370" y="155" width="14" height="8" rx="2"/>
  </g>
  <g font-family="Inter, sans-serif" font-size="12" fill="#f8fafc">
    <text x="120" y="90">Presynaptic</text>
    <text x="120" y="108">neuron</text>
    <text x="480" y="90" text-anchor="end">Postsynaptic</text>
    <text x="480" y="108" text-anchor="end">neuron</text>
    <text x="240" y="105" text-anchor="middle" font-size="11" fill="#67e8f9">Vesicles</text>
    <text x="295" y="200" text-anchor="middle" font-size="11" fill="#67e8f9">Neurotransmitters</text>
    <text x="357" y="148" text-anchor="middle" font-size="11" fill="#f59e0b">Receptors</text>
    <text x="300" y="260" text-anchor="middle" font-size="11" fill="#94a3b8">Synaptic cleft (~20 nm)</text>
  </g>
  <line x1="270" y1="230" x2="330" y2="230" stroke="#94a3b8" stroke-dasharray="3 3"/>
